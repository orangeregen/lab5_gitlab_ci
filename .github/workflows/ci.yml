name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies and pylint
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pylint

      - name: Run pylint
        run: |
          find . -type f -name "*.py" | xargs pylint || true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Check Docker images
        run: docker images
      
  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker user
        run: |
          echo "Docker user is ${{ secrets.DOCKER_USER }}"
          if [ -z "${{ secrets.DOCKER_USER }}" ]; then
            echo "ERROR: DOCKER_USER secret is empty"
            exit 1
          fi

      - name: Verify Docker image exists
        run: |
          if ! docker image inspect devops-app:latest > /dev/null 2>&1; then
            echo "ERROR: Docker image devops-app:latest not found"
            exit 1
          fi

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Tag and Push Docker image
        run: |
          docker tag devops-app:latest ${{ secrets.DOCKER_USER }}/devops-app:latest
          docker push ${{ secrets.DOCKER_USER }}/devops-app:latest
