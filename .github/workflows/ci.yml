name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5   # обновил до v5 для Node.js 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install --upgrade pip
      - run: pip install -r requirements.txt pylint

      - name: Run pylint
        run: find . -type f -name "*.py" | xargs pylint || true
        # '|| true' чтобы ошибки pylint не падали весь workflow

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: |
          docker build -t devops-app .
          echo "Checking that image was created..."
          docker images
          if ! docker image inspect devops-app:latest > /dev/null 2>&1; then
            echo "ERROR: Docker image devops-app:latest not found after build"
            exit 1
          fi

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Push Docker image if exists
        run: |
          echo "Listing local Docker images:"
          docker images
          if docker image inspect devops-app:latest > /dev/null 2>&1; then
            docker tag devops-app ${{ secrets.DOCKER_USER }}/devops-app:latest
            docker push ${{ secrets.DOCKER_USER }}/devops-app:latest
          else
            echo "Docker image devops-app:latest does not exist, skipping push"
          fi
