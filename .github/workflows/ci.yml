name: DevOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # принудительно использовать Node.js 24 для actions
    steps:
      - uses: actions/checkout@v4.11.0             # обновленная версия checkout
      - name: Install Python
        uses: actions/setup-python@v5.3.0         # обновленная версия setup-python
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt pylint
      - name: Run pylint
        run: find . -type f -name "*.py" | xargs pylint

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.11.0
      - name: Build Docker image
        run: docker build -t devops-app .

  publish:
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.11.0
      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
      - name: Push image
        run: |
          docker tag devops-app ${{ secrets.DOCKER_USER }}/devops-app:latest
          docker push ${{ secrets.DOCKER_USER }}/devops-app:latest
